/* ─── Supabase helpers ─── */
async function dbLoad() {
  const { data, error } = await sb.from("weekly_data").select("*");
  if (error) throw error;
  const result = { 1:{ ...SEED } };
  (data||[]).forEach(row => {
    if (!result[row.week_number]) result[row.week_number] = {};
    result[row.week_number][row.member_id] = row.data;
  });
  Object.keys(SEED).forEach(k => { if (!result[1][k]) result[1][k] = SEED[k]; });
  return result;
}
async function dbUpsert(weekNumber, memberId, memberData) {
  const { error } = await sb.from("weekly_data").upsert(
    { week_number:weekNumber, member_id:memberId, data:memberData, updated_at:new Date().toISOString() },
    { onConflict:"week_number,member_id" }
  );
  if (error) throw error;
}
async function dbLoadTareas() {
  const { data, error } = await sb.from("task_progress").select("*");
  if (error) throw error;
  const map = {};
  (data||[]).forEach(r => {
    map[r.task_id] = r;
    if (r.task_id.startsWith("usr_") && r.pantalla) {
      const idx = CRONOGRAMA.findIndex(p => p.pantalla === r.pantalla);
      if (idx !== -1 && !CRONOGRAMA[idx].tareas.find(t => t.id === r.task_id)) {
        CRONOGRAMA[idx].tareas.push({
          id:r.task_id, nombre:r.nombre||"", progreso:r.progreso||0,
          responsable:r.responsable||"", inicio:r.inicio||"", fin:r.fin||"", comentario:r.comentario||""
        });
      }
    }
  });
  return map;
}
async function dbUpsertTarea(taskId, fields) {
  const { error } = await sb.from("task_progress").upsert(
    { task_id:taskId, ...fields, updated_at:new Date().toISOString() },
    { onConflict:"task_id" }
  );
  if (error) throw error;
}
async function dbLoadPantallaConfig() {
  const { data, error } = await sb.from("pantalla_config").select("*");
  if (error) throw error;
  const map = {};
  (data||[]).forEach(r => { map[r.pantalla] = r; });
  return map;
}
async function dbUpsertPantallaConfig(pantalla, fields) {
  const { error } = await sb.from("pantalla_config").upsert(
    { pantalla, ...fields, updated_at:new Date().toISOString() },
    { onConflict:"pantalla" }
  );
  if (error) throw error;
}

/* ─── Lógica de negocio ─── */
function normalizarProgreso(v) {
  if (v===null||v===undefined||v==="") return 0;
  const n = parseFloat(v);
  if (isNaN(n)) return 0;
  return n<=1 ? Math.round(n*100) : Math.min(100, Math.max(0, Math.round(n)));
}
function estadoTarea(p) { return p>=100?"Completada":p>0?"En curso":"Pendiente"; }
function calcularAvancePantalla(tareas, overrides) {
  if (!tareas.length) return 0;
  const total = tareas.reduce((s,t) => {
    const ov = overrides[t.id];
    return s + (ov ? normalizarProgreso(ov.progreso) : normalizarProgreso(t.progreso));
  }, 0);
  return Math.round(total / tareas.length);
}
function getDaysRemaining(isoTarget, fromDate = new Date()) {
  const target = new Date(isoTarget + "T00:00:00Z");
  const from   = Date.UTC(fromDate.getFullYear(), fromDate.getMonth(), fromDate.getDate());
  const diff   = target.getTime() - from;
  if (isNaN(diff)) return null;
  if (diff < 0)    return -1;
  return Math.ceil(diff / 86_400_000);
}
/* Convierte "YYYY-MM-DD" a timestamp fin de día para comparación acumulada */
function toEndOfDayMs(str) {
  if (!str) return null;
  const d = new Date(str.slice(0,10) + "T23:59:59");
  return isNaN(d.getTime()) ? null : d.getTime();
}

/* Barra de progreso acumulada */
function BarAcum({ label, pct, done, total }) {
  const col = pct >= 100 ? C.gl : pct >= 60 ? C.gold : pct > 0 ? C.rl : C.g;
  return (
    <div style={{ display:"flex", alignItems:"center", gap:14 }}>
      <span style={{ fontSize:11, color:C.g, minWidth:250 }}>{label}</span>
      <div style={{ flex:1, maxWidth:260, height:7, background:"rgba(255,255,255,0.1)", borderRadius:99 }}>
        <div style={{ width:`${pct}%`, height:"100%", background:col, borderRadius:99, transition:"width .5s" }}/>
      </div>
      <span style={{ fontSize:15, fontWeight:700, color:col, minWidth:44 }}>{pct}%</span>
      <span style={{ fontSize:10, color:C.g }}>
        {total === 0 ? "Sin vencimientos registrados" : `${done}/${total} completadas`}
      </span>
    </div>
  );
}

    const bl=Object.entries(wd).filter(([k,d])=>k!=='_global'&&d.blocked&&!d.blocked.toLowerCase().includes("sin bloqueo")).map(([k,d])=>({name:TEAM.find(t=>t.id===k)?.name,text:d.blocked}));
    const dc=Object.entries(wd).filter(([k,d])=>k!=='_global'&&d.decision&&d.decision.toLowerCase().startsWith("sí")).map(([k,d])=>({name:TEAM.find(t=>t.id===k)?.name,text:d.decision.replace(/^sí\s*[-—–]\s*/i,"")}));
    const dr = getDaysRemaining("2026-05-15", today);
    return { hm, am, ov, bl, dc, dr };
  }, [wd, wk, today]);

  /* Layout helpers */
  const PH = t => (
    <div style={{ background:C.navy, borderBottom:`3px solid ${C.teal}`, padding:"16px 28px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
      <h1 style={{ fontSize:20, fontWeight:300, letterSpacing:1, color:C.w, margin:0 }}>{t}</h1>
      <div style={{ display:"flex", alignItems:"center", gap:14 }}>
        {sv && <span style={{ fontSize:10, color:C.gold }}>Guardando…</span>}
        {svt && !sv && <span style={{ fontSize:10, color:C.gl }}>✓ {svt}</span>}
        {err && <span style={{ fontSize:10, color:C.rl }}>⚠ {err}</span>}
        <span style={{ fontSize:12, color:C.g }}>RTIC | YPF S.A.</span>
      </div>
    </div>
  );
  const PF = (
    <div style={{ background:C.navy, padding:"8px 28px", display:"flex", justifyContent:"space-between", fontSize:10, color:C.g, borderTop:`1px solid ${C.bd}` }}>
      <span>RTIC | Supply Chain | YPF S.A.</span><span>PRIVADO — USO INTERNO</span>
    </div>
  );
  const SH = (t,col) => <div style={{ background:col, color:C.w, padding:"7px 14px", fontSize:12, fontWeight:700, letterSpacing:0.4, borderRadius:"4px 4px 0 0" }}>{t}</div>;

  if (ld) return (
    <div style={{ fontFamily:"'Segoe UI',sans-serif", background:C.navy, minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:14 }}>
      <div style={{ width:36, height:36, border:`3px solid ${C.bd}`, borderTop:`3px solid ${C.teal}`, borderRadius:"50%", animation:"sp 1s linear infinite" }}/>
      <div style={{ color:C.teal, fontSize:13 }}>Conectando con Supabase…</div>
      <style>{`@keyframes sp{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  return (
    <div style={{ fontFamily:"'Segoe UI','Helvetica Neue',sans-serif", background:"#e8ecf1", minHeight:"100vh" }}>

      {/* NAV */}
      <div style={{ background:C.navy, display:"flex", alignItems:"center", padding:"0 10px", borderBottom:`2px solid ${C.teal}`, position:"sticky", top:0, zIndex:100, flexWrap:"wrap" }}>
        {[["cover","Portada"],["input","Carga Semanal"],["avance","Avance"],["calendar","Calendario"],["resumen","Resumen Ejecutivo"],["metricas","Métricas"],["admin","⚙"]].map(([k,l])=>(
          <button key={k} onClick={()=>setPg(k)} style={{ padding:"12px 14px", border:"none", background:pg===k?C.nl:"transparent", color:pg===k?C.teal:C.gl2, fontSize:12, fontWeight:pg===k?600:400, cursor:"pointer", borderBottom:pg===k?`2px solid ${C.teal}`:"2px solid transparent" }}>{l}</button>
        ))}
        <div style={{ marginLeft:"auto", padding:"6px 0" }}>
          <select value={wk} onChange={e=>setWk(Number(e.target.value))}
            style={{ background:C.nl, border:`1px solid ${C.bd}`, color:C.teal, padding:"5px 8px", borderRadius:4, fontSize:12, fontWeight:700, outline:"none" }}>
            {WEEKS.map(w=><option key={w.n} value={w.n}>Sem {w.n} ({w.s}–{w.e})</option>)}
          </select>
        </div>
      </div>

      {/* ── PORTADA ── */}
      {pg==="cover" && (
        <div style={{ background:C.navy, minHeight:"calc(100vh - 46px)", display:"flex", flexDirection:"column", justifyContent:"center", padding:"50px 70px", position:"relative" }}>
          <div style={{ maxWidth:750 }}>
            <h1 style={{ fontSize:48, fontWeight:300, color:C.w, lineHeight:1.1, margin:0 }}>REAL TIME INTELIGENCE CENTER</h1>
            <div style={{ width:350, height:4, background:C.teal, margin:"28px 0" }}/>
            <h2 style={{ fontSize:24, fontWeight:300, color:C.teal, margin:"0 0 40px" }}>Resumen Ejecutivo Semanal</h2>
            <div style={{ background:C.nl, border:`1px solid ${C.bd}`, borderRadius:4, padding:"22px 26px", maxWidth:460 }}>
              {[["SEMANA",`N°${wk} — ${wc.sf} al ${wc.ef}`],["RESPONSABLE","Claus Drescher"],["ÁREA","Supply Chain — Performance"],["VERSIÓN","v1.0"]].map(([l,v])=>(
                <div key={l} style={{ marginBottom:11 }}>
                  <span style={{ fontSize:11, fontWeight:700, color:C.teal, letterSpacing:1.5, marginRight:10 }}>{l}</span>
                  <span style={{ fontSize:13, color:C.w }}>{v}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{ position:"absolute", bottom:24, left:0, right:0, textAlign:"center", fontSize:11, color:C.g }}>PRIVADO — USO INTERNO</div>
        </div>
      )}

      {/* ── AVANCE ── */}
      {pg==="avance" && (() => {
        const colAvance = p => { const a=calcularAvancePantalla(p.tareas,tareaOv); return a>=100?C.grn:a>0?C.gold:C.g; };
        const estadoPantalla = p => { const a=calcularAvancePantalla(p.tareas,tareaOv); return a>=100?"Completada":a>0?"En curso":"Pendiente"; };
        return (
          <div style={{ background:"#e8ecf1" }}>
            {PH("AVANCE DE PANTALLAS")}

            {/* ── Barras de progreso ── */}
            <div style={{ background:C.navy, padding:"12px 28px", display:"flex", flexDirection:"column", gap:10, borderBottom:`1px solid ${C.bd}` }}>
              {/* Global */}
              <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                <span style={{ fontSize:11, color:C.g, minWidth:250 }}>AVANCE GLOBAL DEL PROYECTO</span>
                <div style={{ flex:1, maxWidth:260, height:7, background:"rgba(255,255,255,0.1)", borderRadius:99 }}>
                  <div style={{ width:`${avanceGlobal}%`, height:"100%", background:avanceGlobal>=100?C.gl:avanceGlobal>30?C.teal:C.gold, borderRadius:99, transition:"width .4s" }}/>
                </div>
                <span style={{ fontSize:15, fontWeight:700, color:C.teal, minWidth:44 }}>{avanceGlobal}%</span>
                {svTarea && <span style={{ fontSize:10, color:svTarea==="ok"?C.gl:svTarea==="error"?C.rl:C.gold, marginLeft:"auto" }}>{svTarea==="saving"?"Guardando…":svTarea==="ok"?"✓ Guardado":"⚠ Error al guardar"}</span>}
              </div>
              {/* Tareas acumuladas */}
              <BarAcum
                label="TAREAS COMPLETADAS AL DÍA DE HOY"
                pct={indicadoresHoy.pctTareas}
                done={indicadoresHoy.tareasDone}
                total={indicadoresHoy.tareasTotal}
              />
              {/* Pantallas acumuladas */}
              <BarAcum
                label="PANTALLAS COMPLETADAS AL DÍA DE HOY"
                pct={indicadoresHoy.pctPantallas}
                done={indicadoresHoy.pantallasDone}
                total={indicadoresHoy.pantallasTotal}
              />
            </div>

            {/* Filtros */}
            <div style={{ padding:"12px 24px", background:C.w, borderBottom:"1px solid #e8ecf1", display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
              <input value={busqueda} onChange={e=>setBusqueda(e.target.value)} placeholder="🔍 Buscar pantalla..."
                style={{ padding:"6px 10px", border:"1px solid #dde", borderRadius:4, fontSize:12, width:220 }}/>
              <select value={filtroEtapa} onChange={e=>setFiltroEtapa(e.target.value)}
                style={{ padding:"6px 10px", border:"1px solid #dde", borderRadius:4, fontSize:12 }}>
                <option value="Todas">Todas las etapas</option>
                {etapas.map(e=><option key={e} value={e}>{e}</option>)}
              </select>
              <select value={filtroEstado} onChange={e=>setFiltroEstado(e.target.value)}
                style={{ padding:"6px 10px", border:"1px solid #dde", borderRadius:4, fontSize:12 }}>
                {["Todos","Pendiente","En curso","Completada"].map(e=><option key={e} value={e}>{e}</option>)}
              </select>
              <span style={{ fontSize:11, color:C.g, marginLeft:"auto" }}>{pantallasVisibles.length} pantallas</span>
            </div>

            {/* Cards */}
            <div style={{ padding:"18px 24px" }}>
              {pantallasVisibles.map(p => {
                const avance     = calcularAvancePantalla(p.tareas, tareaOv);
                const estado     = estadoPantalla(p);
                const col        = colAvance(p);
                const isExp      = expandedP === p.pantalla;
                const completadas = p.tareas.filter(t=>normalizarProgreso((tareaOv[t.id]||t).progreso)>=100).length;
                const enCurso    = p.tareas.filter(t=>{const v=normalizarProgreso((tareaOv[t.id]||t).progreso);return v>0&&v<100;}).length;
                const pendientes = p.tareas.filter(t=>normalizarProgreso((tareaOv[t.id]||t).progreso)===0).length;
                const isAddingHere = newTarea === p.pantalla;
                const ffVal = pantallaConfig[p.pantalla]?.fecha_fin || "";
                return (
                  <div key={p.pantalla} style={{ background:C.w, borderRadius:6, marginBottom:10, border:`1px solid ${isExp?C.teal:"#e0e0e0"}`, overflow:"hidden", boxShadow:"0 1px 4px rgba(0,0,0,0.05)" }}>
                    <div onClick={()=>{ setExpandedP(isExp?null:p.pantalla); if(isExp){setNewTarea(null);setEditTarea(null);} }}
                      style={{ padding:"14px 18px", cursor:"pointer", display:"flex", alignItems:"center", gap:14 }}>
                      <div style={{ flex:1 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                          <span style={{ fontSize:14, fontWeight:700, color:C.navy }}>{p.pantalla}</span>
                          <span style={{ fontSize:10, color:C.g }}>{p.etapa}</span>
                          <span style={{ padding:"2px 8px", borderRadius:99, fontSize:9, fontWeight:700, background:estado==="Completada"?"rgba(46,125,50,0.1)":estado==="En curso"?"rgba(232,168,56,0.1)":"rgba(144,164,174,0.15)", color:estado==="Completada"?C.grn:estado==="En curso"?"#b8860b":C.g, marginLeft:"auto" }}>{estado}</span>
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          <div style={{ flex:1, height:8, background:"#f0f0f0", borderRadius:99 }}>
                            <div style={{ width:`${avance}%`, height:"100%", background:col, borderRadius:99, transition:"width .4s" }}/>
                          </div>
                          <span style={{ fontSize:13, fontWeight:700, color:col, minWidth:38, textAlign:"right" }}>{avance}%</span>
                        </div>
                        <div style={{ display:"flex", gap:16, marginTop:6, fontSize:10, color:C.g, alignItems:"center", flexWrap:"wrap" }}>
                          <span>📋 {p.tareas.length} tareas</span>
                          <span style={{ color:C.grn }}>✓ {completadas}</span>
                          <span style={{ color:"#b8860b" }}>◑ {enCurso}</span>
                          <span>○ {pendientes}</span>
                          {/* Fecha fin de pantalla */}
                          <span style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:4 }}>
                            🗓 Fecha fin:
                            {editFechaFin === p.pantalla
                              ? <span onClick={e=>e.stopPropagation()} style={{ display:"flex", gap:4, alignItems:"center" }}>
                                  <input type="date" defaultValue={ffVal} id={`ff-${p.pantalla.replace(/[^a-zA-Z0-9]/g,"_")}`}
                                    style={{ padding:"2px 5px", border:"1px solid #dde", borderRadius:3, fontSize:10 }}/>
                                  <button onClick={async e => {
                                    e.stopPropagation();
                                    const val = document.getElementById(`ff-${p.pantalla.replace(/[^a-zA-Z0-9]/g,"_")}`).value;
                                    try {
                                      await dbUpsertPantallaConfig(p.pantalla, { fecha_fin: val||null });
                                      setPantallaConfig(prev=>({...prev,[p.pantalla]:{...prev[p.pantalla],fecha_fin:val}}));
                                    } catch(e){console.error(e);}
                                    setEditFechaFin(null);
                                  }} style={{ padding:"2px 7px", background:C.teal, color:C.w, border:"none", borderRadius:3, fontSize:10, fontWeight:700, cursor:"pointer" }}>✓</button>
                                  <button onClick={e=>{e.stopPropagation();setEditFechaFin(null);}} style={{ padding:"2px 6px", background:"#eee", border:"none", borderRadius:3, fontSize:10, cursor:"pointer" }}>✕</button>
                                </span>
                              : <span onClick={e=>{e.stopPropagation();setEditFechaFin(p.pantalla);}}
                                  style={{ cursor:"pointer", color:ffVal?C.navy:"#bbb", textDecoration:"underline dotted" }}>
                                  {ffVal || "Sin definir"}
                                </span>
                            }
                          </span>
                        </div>
                      </div>
                      <span style={{ fontSize:16, color:C.g, userSelect:"none" }}>{isExp?"▲":"▼"}</span>
                    </div>

                    {isExp && (
                      <div style={{ borderTop:`1px solid #f0f0f0` }}>
                        <div style={{ overflowX:"auto" }}>
                          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
                            <thead>
                              <tr style={{ background:"#f7f9fb" }}>
                                {["Tarea","Progreso","Estado","Responsable","Inicio","Fin","Comentario",""].map(h=>(
                                  <th key={h} style={{ padding:"7px 8px", textAlign:"left", color:C.g, fontWeight:600, fontSize:10, borderBottom:"1px solid #eee" }}>{h}</th>
                                ))}
                              </tr>
                            </thead>
                            <tbody>
                              {p.tareas.map(t => {
                                const ov     = tareaOv[t.id] || {};
                                const prog   = normalizarProgreso(ov.progreso!==undefined?ov.progreso:t.progreso);
                                const resp   = ov.responsable || t.responsable;
                                const ini    = ov.inicio || t.inicio;
                                const fin2   = ov.fin || t.fin;
                                const coment = ov.comentario!==undefined?ov.comentario:t.comentario;
                                const est    = estadoTarea(prog);
                                const isEditing = editTarea?.id === t.id;
                                return (
                                  <tr key={t.id} style={{ borderBottom:"1px solid #f5f5f5", background:isEditing?"#fffdf0":"transparent" }}>
                                    <td style={{ padding:"8px", color:C.navy, maxWidth:200 }}>{t.nombre}</td>
                                    <td style={{ padding:"8px", minWidth:100 }}>
                                      {isEditing
                                        ? <input type="number" min={0} max={100} value={editTarea.progreso} onChange={e=>setEditTarea(p=>({...p,progreso:e.target.value}))}
                                            style={{ width:60, padding:"3px 5px", border:"1px solid #dde", borderRadius:3, fontSize:11 }}/>
                                        : <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                                            <div style={{ width:60, height:5, background:"#f0f0f0", borderRadius:99 }}>
                                              <div style={{ width:`${prog}%`, height:"100%", background:prog>=100?C.grn:prog>0?C.gold:C.g, borderRadius:99 }}/>
                                            </div>
                                            <span style={{ fontWeight:700, color:prog>=100?C.grn:prog>0?"#b8860b":C.g }}>{prog}%</span>
                                          </div>
                                      }
                                    </td>
                                    <td style={{ padding:"8px" }}>
                                      <span style={{ padding:"2px 6px", borderRadius:3, fontSize:9, fontWeight:700, background:est==="Completada"?"rgba(46,125,50,0.1)":est==="En curso"?"rgba(232,168,56,0.1)":"rgba(144,164,174,0.1)", color:est==="Completada"?C.grn:est==="En curso"?"#b8860b":C.g }}>{est}</span>
                                    </td>
                                    <td style={{ padding:"8px" }}>
                                      {isEditing
                                        ? <input value={editTarea.responsable} onChange={e=>setEditTarea(p=>({...p,responsable:e.target.value}))}
                                            style={{ width:110, padding:"3px 5px", border:"1px solid #dde", borderRadius:3, fontSize:11 }}/>
                                        : <span style={{ color:"#546e7a" }}>{resp}</span>}
                                    </td>
                                    <td style={{ padding:"8px" }}>
                                      {isEditing
                                        ? <input type="date" value={editTarea.inicio} onChange={e=>setEditTarea(p=>({...p,inicio:e.target.value}))}
                                            style={{ padding:"3px 5px", border:"1px solid #dde", borderRadius:3, fontSize:11 }}/>
                                        : <span style={{ color:"#90a4ae" }}>{ini}</span>}
                                    </td>
                                    <td style={{ padding:"8px" }}>
                                      {isEditing
                                        ? <input type="date" value={editTarea.fin} onChange={e=>setEditTarea(p=>({...p,fin:e.target.value}))}
                                            style={{ padding:"3px 5px", border:"1px solid #dde", borderRadius:3, fontSize:11 }}/>
                                        : <span style={{ color:"#90a4ae" }}>{fin2}</span>}
                                    </td>
                                    <td style={{ padding:"8px", maxWidth:160 }}>
                                      {isEditing
                                        ? <input value={editTarea.comentario} onChange={e=>setEditTarea(p=>({...p,comentario:e.target.value}))}
                                            style={{ width:"100%", padding:"3px 5px", border:"1px solid #dde", borderRadius:3, fontSize:11 }}/>
                                        : <span style={{ color:"#90a4ae", fontStyle:"italic" }}>{coment||"—"}</span>}
                                    </td>
                                    <td style={{ padding:"8px", whiteSpace:"nowrap" }}>
                                      {isEditing
                                        ? <div style={{ display:"flex", gap:4 }}>
                                            <button onClick={()=>guardarTarea(t,editTarea)} style={{ padding:"3px 8px", background:C.teal, color:C.w, border:"none", borderRadius:3, fontSize:10, fontWeight:700, cursor:"pointer" }}>✓</button>
                                            <button onClick={()=>setEditTarea(null)} style={{ padding:"3px 7px", background:"#eee", border:"none", borderRadius:3, fontSize:10, cursor:"pointer" }}>✕</button>
                                          </div>
                                        : <div style={{ display:"flex", gap:4 }}>
                                            <button onClick={()=>setEditTarea({id:t.id,progreso:prog,responsable:resp,inicio:ini,fin:fin2,comentario:coment})} style={{ padding:"3px 8px", background:C.nl, color:C.gl2, border:"none", borderRadius:3, fontSize:10, cursor:"pointer" }}>✏️</button>
                                            <button onClick={()=>borrarTarea(t,p.pantalla)} style={{ padding:"3px 8px", background:"rgba(198,40,40,0.08)", color:C.red, border:"none", borderRadius:3, fontSize:10, cursor:"pointer" }}>🗑️</button>
                                          </div>
                                      }
                                    </td>
                                  </tr>
                                );
                              })}
                            </tbody>
                          </table>
                        </div>
                        {isAddingHere
                          ? <div style={{ padding:"12px 16px", background:"rgba(0,188,212,0.04)", borderTop:"1px solid #e0f7fa" }}>
                              <div style={{ fontSize:11, fontWeight:700, color:C.teal, marginBottom:8 }}>+ Nueva tarea en {p.pantalla}</div>
                              <div style={{ display:"grid", gridTemplateColumns:"2fr 80px 1fr 1fr 1fr 2fr auto", gap:6, alignItems:"center" }}>
                                <input value={newForm.nombre} onChange={e=>setNewForm(f=>({...f,nombre:e.target.value}))} placeholder="Nombre de la tarea *"
                                  style={{ padding:"5px 7px", border:`1px solid ${newForm.nombre?"#dde":C.rl}`, borderRadius:4, fontSize:11, fontFamily:"inherit" }}/>
                                <input type="number" min={0} max={100} value={newForm.progreso} onChange={e=>setNewForm(f=>({...f,progreso:e.target.value}))}
                                  style={{ padding:"5px 7px", border:"1px solid #dde", borderRadius:4, fontSize:11 }}/>
                                <input value={newForm.responsable} onChange={e=>setNewForm(f=>({...f,responsable:e.target.value}))} placeholder="Responsable"
                                  style={{ padding:"5px 7px", border:"1px solid #dde", borderRadius:4, fontSize:11, fontFamily:"inherit" }}/>
                                <input type="date" value={newForm.inicio} onChange={e=>setNewForm(f=>({...f,inicio:e.target.value}))}
                                  style={{ padding:"5px 7px", border:"1px solid #dde", borderRadius:4, fontSize:11 }}/>
                                <input type="date" value={newForm.fin} onChange={e=>setNewForm(f=>({...f,fin:e.target.value}))}
                                  style={{ padding:"5px 7px", border:"1px solid #dde", borderRadius:4, fontSize:11 }}/>
                                <input value={newForm.comentario} onChange={e=>setNewForm(f=>({...f,comentario:e.target.value}))} placeholder="Comentario"
                                  style={{ padding:"5px 7px", border:"1px solid #dde", borderRadius:4, fontSize:11, fontFamily:"inherit" }}/>
                                <div style={{ display:"flex", gap:4 }}>
                                  <button onClick={()=>agregarTarea(p.pantalla)} style={{ padding:"5px 10px", background:C.teal, color:C.w, border:"none", borderRadius:4, fontSize:11, fontWeight:700, cursor:"pointer" }}>Guardar</button>
                                  <button onClick={()=>{ setNewTarea(null); setNewForm({nombre:"",progreso:0,responsable:"",inicio:"",fin:"",comentario:""}); }} style={{ padding:"5px 8px", background:"#eee", border:"none", borderRadius:4, fontSize:11, cursor:"pointer" }}>✕</button>
                                </div>
                              </div>
                            </div>
                          : <div style={{ padding:"8px 16px", borderTop:"1px solid #f0f0f0" }}>
                              <button onClick={()=>{ setNewTarea(p.pantalla); setEditTarea(null); setNewForm({nombre:"",progreso:0,responsable:"",inicio:"",fin:"",comentario:""}); }}
                                style={{ padding:"5px 12px", border:`1px dashed ${C.teal}`, borderRadius:4, background:"rgba(0,188,212,0.04)", color:C.teal, fontSize:11, fontWeight:600, cursor:"pointer" }}>
                                + Agregar tarea
                              </button>
                            </div>
                        }
                        {p.tareas.length===0 && !isAddingHere && (
                          <div style={{ padding:16, textAlign:"center", color:"#90a4ae", fontSize:11, fontStyle:"italic" }}>Sin tareas cargadas</div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
              {pantallasVisibles.length===0 && (
                <div style={{ textAlign:"center", padding:40, color:"#90a4ae", fontSize:13 }}>No se encontraron pantallas con esos filtros.</div>
              )}
            </div>
            {PF}
          </div>
        );
      })()}

      {/* ── CARGA SEMANAL ── */}
      {pg==="input" && (
        <div style={{ background:"#e8ecf1" }}>{PH("CARGA SEMANAL — 5 Preguntas Clave")}
          <div style={{ padding:"18px 24px" }}>
            <div style={{ marginBottom:14, padding:"10px 12px", background:C.w, borderRadius:6, borderLeft:`4px solid ${C.teal}`, fontSize:12, color:"#546e7a" }}>
              Cada integrante carga entregables y actividades <strong>asociados al KPI/pantalla</strong>. Los datos se guardan en Supabase y son visibles para todo el equipo.
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(380px, 1fr))", gap:12 }}>
              {TEAM.map(m => {
                const d=wd[m.id], filled=!!d?.items?.length, isE=ed===m.id, conf=d?.confidence;
                return (
                  <div key={m.id} style={{ background:C.w, borderRadius:6, overflow:"hidden", border:`1px solid ${filled?(conf==="Red"?C.rl:conf==="Amber"?C.gold:C.gl):"#ddd"}`, boxShadow:"0 1px 6px rgba(0,0,0,0.05)" }}>
                    <div style={{ background:C.navy, padding:"10px 12px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div>
                        <div style={{ fontSize:13, fontWeight:600, color:C.w }}>{m.name}</div>
                        <div style={{ fontSize:10, color:C.g }}>{m.role}</div>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                        {filled && <span style={{ padding:"2px 7px", borderRadius:99, fontSize:9, fontWeight:700, background:conf==="Red"?"rgba(198,40,40,0.15)":conf==="Amber"?"rgba(232,168,56,0.15)":"rgba(46,125,50,0.15)", color:conf==="Red"?C.rl:conf==="Amber"?C.gold:C.gl }}>{conf==="Red"?"🔴":conf==="Amber"?"🟡":"🟢"} {conf}</span>}
                        {isE
                          ? <div style={{ display:"flex", gap:3 }}>
                              <button onClick={saveEd} style={{ padding:"4px 10px", borderRadius:4, border:"none", fontSize:10, fontWeight:600, cursor:"pointer", background:C.teal, color:C.w }}>Guardar</button>
                              <button onClick={()=>setEd(null)} style={{ padding:"4px 7px", borderRadius:4, border:"none", fontSize:10, cursor:"pointer", background:C.nl, color:C.gl2 }}>✕</button>
                            </div>
                          : <button onClick={()=>startEd(m.id)} style={{ padding:"4px 10px", borderRadius:4, border:"none", fontSize:10, fontWeight:600, cursor:"pointer", background:C.nl, color:C.w }}>{filled?"Editar":"Cargar"}</button>
                        }
                      </div>
                    </div>
                    {isE ? (
                      <div style={{ padding:12 }}>
                        <div style={{ marginBottom:12 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
                            <label style={{ fontSize:11, fontWeight:700, color:C.grn }}>1. ¿Qué entregaste esta semana?</label>
                            <button onClick={()=>addI("completed")} style={{ padding:"2px 7px", border:`1px solid ${C.grn}`, borderRadius:4, background:"rgba(46,125,50,0.06)", color:C.grn, fontSize:10, fontWeight:600, cursor:"pointer" }}>+ Hito</button>
                          </div>
                          {fi.filter(x=>x.type==="completed").length===0 && <div style={{ fontSize:10, color:"#aaa", fontStyle:"italic" }}>Click "+ Hito" para agregar.</div>}
                          {fi.map((x,i) => x.type==="completed" ? <ItemRow key={x._id} item={x} idx={i} onUp={upI} onRm={rmI}/> : null)}
                        </div>
                        <div style={{ marginBottom:12 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
                            <label style={{ fontSize:11, fontWeight:700, color:"#b8860b" }}>2. ¿Prioridad próxima semana?</label>
                            <button onClick={()=>addI("activity")} style={{ padding:"2px 7px", border:`1px solid ${C.gold}`, borderRadius:4, background:"rgba(232,168,56,0.06)", color:"#b8860b", fontSize:10, fontWeight:600, cursor:"pointer" }}>+ Actividad</button>
                          </div>
                          {fi.filter(x=>x.type==="activity").length===0 && <div style={{ fontSize:10, color:"#aaa", fontStyle:"italic" }}>Click "+ Actividad".</div>}
                          {fi.map((x,i) => x.type==="activity" ? <ItemRow key={x._id} item={x} idx={i} onUp={upI} onRm={rmI}/> : null)}
                        </div>
                        <div style={{ marginBottom:8 }}>
                          <label style={{ fontSize:11, fontWeight:700, color:C.navy, display:"block", marginBottom:3 }}>3. ¿Algo bloqueado?</label>
                          <textarea value={fm.blocked} onChange={e=>setFm(p=>({...p,blocked:e.target.value}))} rows={2}
                            style={{ width:"100%", padding:6, border:"1px solid #dde", borderRadius:4, fontSize:11, resize:"vertical", fontFamily:"inherit", boxSizing:"border-box" }}/>
                        </div>
                        <div style={{ marginBottom:8 }}>
                          <label style={{ fontSize:11, fontWeight:700, color:C.navy, display:"block", marginBottom:3 }}>4. ¿Decisión o escalamiento?</label>
                          <textarea value={fm.decision} onChange={e=>setFm(p=>({...p,decision:e.target.value}))} rows={2}
                            style={{ width:"100%", padding:6, border:"1px solid #dde", borderRadius:4, fontSize:11, resize:"vertical", fontFamily:"inherit", boxSizing:"border-box" }}/>
                        </div>
                        <div>
                          <label style={{ fontSize:11, fontWeight:700, color:C.navy, display:"block", marginBottom:4 }}>5. Confidence</label>
                          <div style={{ display:"flex", gap:6 }}>
                            {["Green","Amber","Red"].map(c=>(
                              <button key={c} onClick={()=>setFm(p=>({...p,confidence:c}))}
                                style={{ flex:1, padding:"6px 0", borderRadius:4, border:`2px solid ${fm.confidence===c?(c==="Red"?C.red:c==="Amber"?C.gold:C.grn):"#ddd"}`, background:fm.confidence===c?(c==="Red"?"rgba(198,40,40,0.08)":c==="Amber"?"rgba(232,168,56,0.08)":"rgba(46,125,50,0.08)"):"#fff", fontSize:11, fontWeight:600, cursor:"pointer", color:c==="Red"?C.red:c==="Amber"?"#b8860b":C.grn }}>
                                {c==="Red"?"🔴":c==="Amber"?"🟡":"🟢"} {c}
                              </button>
                            ))}
                          </div>
                        </div>
                      </div>
                    ) : filled ? (
                      <div style={{ padding:12, fontSize:11, color:"#37474f" }}>
                        <div style={{ display:"flex", gap:12, marginBottom:5 }}>
                          <span style={{ color:C.grn, fontWeight:600 }}>{d.items.filter(x=>x.type==="completed").length} hitos</span>
                          <span style={{ color:"#b8860b", fontWeight:600 }}>{d.items.filter(x=>x.type==="activity").length} actividades</span>
                        </div>
                        {d.items.slice(0,3).map((x,i)=>(
                          <div key={i} style={{ fontSize:10, marginBottom:2, color:"#546e7a" }}>
                            <span style={{ background:x.type==="completed"?"rgba(46,125,50,0.1)":"rgba(232,168,56,0.1)", padding:"1px 4px", borderRadius:3, fontSize:9, marginRight:4, fontWeight:600, color:x.type==="completed"?C.grn:"#b8860b" }}>{x.area}</span>
                            {x.text.substring(0,65)}{x.text.length>65?"…":""}
                          </div>
                        ))}
                        {d.items.length>3 && <div style={{ fontSize:9, color:"#90a4ae", marginTop:2 }}>+{d.items.length-3} más</div>}
                        {d.blocked && !d.blocked.toLowerCase().includes("sin bloqueo") && (
                          <div style={{ marginTop:5, padding:"4px 6px", background:"rgba(198,40,40,0.05)", borderRadius:3, fontSize:10, color:C.red }}>⚠ {d.blocked.substring(0,80)}</div>
                        )}
                      </div>
                    ) : (
                      <div style={{ padding:18, textAlign:"center", color:"#90a4ae", fontSize:12 }}>Sin carga esta semana</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
          {PF}
        </div>
      )}

      {/* ── CALENDARIO ── */}
      {pg==="calendar" && (
        <div style={{ background:"#e8ecf1" }}>{PH("Calendario")}
          <div style={{ padding:"18px 24px" }}>
            <div style={{ background:"#f5f7fa", borderRadius:8, padding:18, display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12 }}>
              {WEEKS.map(w=>{
                const d2=dt[w.n], f=d2?Object.keys(d2).filter(k=>k!=='_global').length:0, cur=w.n===wk;
                return (
                  <div key={w.n} onClick={()=>{setWk(w.n);setPg("resumen");}} style={{ background:C.w, borderRadius:6, overflow:"hidden", cursor:"pointer", border:cur?`2px solid ${C.teal}`:"1px solid #e0e0e0", boxShadow:cur?"0 0 10px rgba(0,188,212,0.2)":"0 1px 3px rgba(0,0,0,0.04)" }}>
                    <div style={{ background:C.navy, padding:"6px 10px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div style={{ width:7, height:7, borderRadius:99, background:f>3?C.gl:f>0?C.gold:"#546e7a" }}/>
                      {cur && <span style={{ fontSize:8, color:C.teal, fontWeight:700 }}>ACTUAL</span>}
                    </div>
                    <div style={{ padding:"12px 10px", textAlign:"center" }}>
                      <div style={{ fontSize:18, fontWeight:300, color:C.navy }}>SEMANA {w.n}</div>
                      <div style={{ fontSize:10, color:"#90a4ae", marginTop:3 }}>{w.s} — {w.e}</div>
                      {f>0 && <div style={{ fontSize:9, color:C.teal, marginTop:4, fontWeight:600 }}>{f}/{TEAM.length} cargas</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          {PF}
        </div>
      )}

      {/* ── RESUMEN ── */}
      {pg==="resumen" && (
        <div style={{ background:"#e8ecf1" }}>{PH("RESUMEN EJECUTIVO")}
          <div style={{ padding:"18px 24px" }}>
            <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr", gap:12, marginBottom:16 }}>
              <div style={{ background:C.w, borderLeft:`5px solid ${sum.ov==="GREEN"?C.grn:sum.ov==="AMBER"?C.gold:sum.ov==="RED"?C.red:"#90a4ae"}`, borderRadius:"0 6px 6px 0", padding:"14px 20px" }}>
                <div style={{ fontSize:12, color:C.g, fontWeight:500, letterSpacing:1 }}>ESTADO GENERAL</div>
                <div style={{ fontSize:24, fontWeight:700, marginTop:3, color:sum.ov==="GREEN"?C.grn:sum.ov==="AMBER"?"#b8860b":sum.ov==="RED"?C.red:"#90a4ae" }}>{sum.ov==="GREEN"?"EN CURSO":sum.ov==="AMBER"?"EN RIESGO":sum.ov==="RED"?"CRÍTICO":"SIN DATOS"}</div>
              </div>
              <div style={{ background:C.w, borderRadius:6, padding:"14px 20px", borderTop:`3px solid ${C.gold}` }}>
                <div style={{ fontSize:12, color:C.g, fontWeight:500, letterSpacing:1 }}>SEMANA</div>
                <div style={{ fontSize:32, fontWeight:300, color:C.navy }}>N° {wk}</div>
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              <div style={{ background:C.w, borderRadius:6, overflow:"hidden" }}>{SH("HITOS ALCANZADOS",C.grn)}
                <div style={{ padding:"12px 16px" }}>
                  {Object.keys(sum.hm).length===0 ? <p style={{ color:"#90a4ae", fontSize:12, fontStyle:"italic" }}>Sin hitos cargados.</p>
                    : Object.entries(sum.hm).map(([a,its])=>(
                      <div key={a} style={{ marginBottom:12 }}>
                        <div style={{ fontSize:13, fontWeight:700, color:C.navy, marginBottom:3 }}>{a}</div>
                        {its.map((x,i)=><div key={i} style={{ fontSize:11, color:"#546e7a", lineHeight:1.5, fontStyle:"italic", paddingLeft:9, borderLeft:"2px solid #e0e0e0", marginBottom:3 }}>{x.text}</div>)}
                      </div>
                    ))
                  }
                </div>
              </div>
              <div style={{ background:C.w, borderRadius:6, overflow:"hidden" }}>{SH("ACTIVIDADES EN CURSO",C.gold)}
                <div style={{ padding:"12px 16px" }}>
                  {Object.keys(sum.am).length===0 ? <p style={{ color:"#90a4ae", fontSize:12, fontStyle:"italic" }}>Sin actividades.</p>
                    : Object.entries(sum.am).map(([a,its])=>(
                      <div key={a} style={{ marginBottom:12 }}>
                        <div style={{ fontSize:13, fontWeight:700, color:C.navy, marginBottom:3 }}>{a}</div>
                        {its.map((x,i)=><div key={i} style={{ fontSize:11, color:"#546e7a", lineHeight:1.5, fontStyle:"italic", paddingLeft:9, borderLeft:"2px solid #e0e0e0", marginBottom:3 }}>{x.text}</div>)}
                      </div>
                    ))
                  }
                </div>
              </div>
            </div>
          </div>
          {PF}
        </div>
      )}

      {/* ── MÉTRICAS ── */}
      {pg==="metricas" && (
        <div style={{ background:"#e8ecf1" }}>{PH("MÉTRICAS DE AVANCE Y KPIs")}
          <div style={{ padding:"18px 24px" }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:18 }}>
              {[
                { v:sum.dr===-1?"✓":sum.dr===null?"—":sum.dr, l:sum.dr===-1?"Proyecto Finalizado":"Días Restantes", bc:sum.dr===-1?C.grn:C.navy },
                { v:sum.bl.length, l:"Issues Abiertos", bc:C.red }
              ].map((c,i)=>(
                <div key={i} style={{ background:C.w, borderRadius:6, overflow:"hidden", textAlign:"center" }}>
                  <div style={{ height:5, background:c.bc }}/>
                  <div style={{ padding:"22px 16px" }}>
                    <div style={{ fontSize:44, fontWeight:300, color:c.bc, fontFamily:"Georgia,serif" }}>[ {c.v} ]</div>
                    <div style={{ fontSize:14, fontWeight:600, color:C.navy, marginTop:3 }}>{c.l}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
              <div style={{ background:C.w, borderRadius:6, overflow:"hidden" }}>{SH("PRÓXIMOS PASOS",C.td)}
                <div style={{ padding:"12px 16px", minHeight:160 }}>
                  {Object.keys(sum.am).length===0 ? <p style={{ color:"#90a4ae", fontSize:11, fontStyle:"italic" }}>Sin datos.</p>
                    : Object.entries(sum.am).slice(0,5).map(([a,its])=>(
                      <div key={a} style={{ marginBottom:8 }}><div style={{ fontSize:12, fontWeight:700, color:C.navy }}>{a}</div>{its.slice(0,2).map((x,i)=><div key={i} style={{ fontSize:11, color:"#546e7a", fontStyle:"italic" }}>{x.text}</div>)}</div>
                    ))
                  }
                </div>
              </div>
              <div style={{ background:C.w, borderRadius:6, overflow:"hidden" }}>{SH("DECISIONES REQUERIDAS",C.navy)}
                <div style={{ padding:"12px 16px", minHeight:160 }}>
                  {sum.dc.length===0 ? <p style={{ color:"#90a4ae", fontSize:11, fontStyle:"italic" }}>Sin decisiones.</p>
                    : sum.dc.map((d,i)=>(
                      <div key={i} style={{ marginBottom:10 }}><div style={{ fontSize:12, fontWeight:700, color:C.navy }}>{d.text}</div><div style={{ fontSize:10, color:C.g }}>Solicitado: {d.name}</div></div>
                    ))
                  }
                </div>
              </div>
              <div style={{ background:C.w, borderRadius:6, overflow:"hidden" }}>{SH("RIESGOS / BLOQUEOS",C.red)}
                <div style={{ padding:"12px 16px", minHeight:160 }}>
                  {sum.bl.length===0 ? <p style={{ color:"#90a4ae", fontSize:11, fontStyle:"italic" }}>Sin bloqueos.</p>
                    : sum.bl.map((b,i)=>(
                      <div key={i} style={{ marginBottom:10 }}><div style={{ fontSize:12, fontWeight:700, color:C.navy }}>{b.text}</div><div style={{ fontSize:10, color:C.g }}>Reportado: {b.name}</div></div>
                    ))
                  }
                </div>
              </div>
            </div>
            <div style={{ marginTop:16, background:C.w, borderRadius:6, padding:16 }}>
              <div style={{ fontSize:12, fontWeight:600, color:C.navy, marginBottom:8 }}>Confidence — Semana {wk}</div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:6 }}>
                {TEAM.map(m=>{
                  const c=wd[m.id]?.confidence;
                  return (
                    <div key={m.id} style={{ textAlign:"center", padding:"8px 4px", borderRadius:6, background:c==="Red"?"rgba(198,40,40,0.08)":c==="Amber"?"rgba(232,168,56,0.08)":c==="Green"?"rgba(46,125,50,0.08)":"#f5f5f5", border:`1px solid ${c==="Red"?"rgba(198,40,40,0.2)":c==="Amber"?"rgba(232,168,56,0.2)":c==="Green"?"rgba(46,125,50,0.2)":"#e0e0e0"}` }}>
                      <div style={{ fontSize:16 }}>{c==="Red"?"🔴":c==="Amber"?"🟡":c==="Green"?"🟢":"⚪"}</div>
                      <div style={{ fontSize:10, fontWeight:600, color:C.navy }}>{m.name.split(" ")[0]}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
          {PF}
        </div>
      )}

      {/* ── ADMIN ── */}
      {pg==="admin" && (
        <div style={{ background:"#e8ecf1" }}>{PH("ADMINISTRACIÓN")}
          <div style={{ padding:"18px 24px", maxWidth:720 }}>
            <div style={{ background:C.w, borderRadius:6, padding:16, marginBottom:14, borderLeft:`4px solid ${C.teal}` }}>
              <div style={{ fontSize:12, fontWeight:600, color:C.navy, marginBottom:6 }}>Almacenamiento</div>
              <div style={{ display:"flex", gap:16, alignItems:"center", flexWrap:"wrap" }}>
                <span style={{ fontSize:11, color:"#546e7a" }}>☁️ Guardado en <strong>Supabase</strong> — compartido con todo el equipo</span>
                {svt && <span style={{ fontSize:10, color:C.gl }}>✓ Último guardado: {svt}</span>}
              </div>
            </div>
            <div style={{ background:C.w, borderRadius:6, padding:16 }}>
              <div style={{ fontSize:12, fontWeight:600, color:C.navy, marginBottom:10 }}>Estado por semana</div>
              {WEEKS.map(w=>{
                const d2=dt[w.n], f=d2?Object.keys(d2).filter(k=>k!=='_global').length:0;
                return (
                  <div key={w.n} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 10px", borderRadius:5, background:f>0?"rgba(0,188,212,0.04)":"#fafafa", border:`1px solid ${f>0?C.bd:"#eee"}`, marginBottom:4 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ width:6, height:6, borderRadius:99, background:f>3?C.gl:f>0?C.gold:"#ddd" }}/>
                      <span style={{ fontSize:11, color:C.navy }}>Sem {w.n}</span>
                      <span style={{ fontSize:10, color:C.g }}>{w.s}–{w.e}</span>
                    </div>
                    <span style={{ fontSize:10, color:f>0?C.teal:"#bbb" }}>{f}/{TEAM.length} cargas</span>
                  </div>
                );
              })}
            </div>
          </div>
          {PF}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
